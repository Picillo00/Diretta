<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>HUD Pro Sport Analytics</title>
<style>
  :root { --bg: #000; --text: #fff; --dim: #777; --live: #ff3b3b; --calcio: #39ff14; --basket: #ff7b00; --tennis: #e1ff00; }
  * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
  body { height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; touch-action: none; }

  /* UI Base */
  #header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; border-bottom: 2px solid var(--dim); background: #000; }
  #main-view { height: calc(100% - 45px); width: 100%; position: relative; overflow-y: auto; }
  
  .match-card { background: #111; border-radius: 12px; padding: 12px; margin: 10px; border-left: 4px solid var(--dim); cursor: pointer; }
  .status.live { color: var(--live); animation: blink 1.5s infinite; font-weight: bold; }
  
  /* Dettaglio */
  #match-detail { display: none; padding: 15px; }
  #match-detail.active { display: block; }
  .section-title { font-size: 14px; color: var(--dim); text-transform: uppercase; margin: 20px 0 10px 0; border-bottom: 1px solid #333; padding-bottom: 5px; }
  
  .event-row { background: #1a1a1a; padding: 8px; border-radius: 6px; margin-bottom: 5px; font-size: 14px; display: flex; gap: 10px; }
  .player-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #222; font-size: 13px; }
  
  @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
</style>
</head>
<body>

<div id="header">
  <button id="btn-home" style="display:none; background:#333; color:#fff; border:none; padding:5px; border-radius:5px;">⬅ HOME</button>
  <div id="sport-title" style="font-weight:bold;">CALCIO</div>
  <input type="date" id="date-picker" style="background:#222; color:#fff; border:none; padding:5px; border-radius:5px;">
</div>

<div id="main-view">
  <div id="matches-list"></div>
  <div id="match-detail">
    <div id="det-header" style="text-align:center; margin-bottom:20px;"></div>
    <div class="section-title">Momenti Salienti</div>
    <div id="det-timeline" class="timeline"></div>
    <div class="section-title">Formazioni</div>
    <div id="det-lineups"></div>
  </div>
</div>

<script>
(() => {
  const datePicker = document.getElementById('date-picker');
  const today = new Date();
  datePicker.value = today.toISOString().split('T')[0];

  const sports = ["CALCIO", "BASKET", "TENNIS"];
  let currentSport = 0;
  
  // TRADUTTORE EVENTI IN ITALIANO
  const translate = (text) => {
    const t = text.toLowerCase();
    if (t.includes('goal')) return '⚽ Gol';
    if (t.includes('yellow card')) return '🟨 Cartellino Giallo';
    if (t.includes('red card')) return '🟥 Cartellino Rosso';
    if (t.includes('penalty')) return '❌ Rigore';
    if (t.includes('substitution')) return '🔄 Sostituzione';
    if (t.includes('injury')) return '🤕 Infortunio';
    return text;
  };

  async function loadData() {
    const dateStr = datePicker.value.replace(/-/g, '');
    const sportName = sports[currentSport];
    const listEl = document.getElementById('matches-list');
    listEl.innerHTML = 'Caricamento...';

    // Fetch semplificato per brevità
    const url = `https://site.api.espn.com/apis/site/v2/sports/${sportName.toLowerCase() === 'calcio' ? 'soccer/ita.1' : 'basketball/nba'}/scoreboard?dates=${dateStr}`;
    
    try {
      const res = await fetch(url);
      const data = await res.json();
      let matches = data.events;

      // ORDINAMENTO INTELLIGENTE (Smart Rank)
      matches.sort((a, b) => {
        if (a.status.type.state === 'in' && b.status.type.state !== 'in') return -1;
        if (a.status.type.state === 'pre' && b.status.type.state === 'post') return -1;
        return 0;
      });

      listEl.innerHTML = '';
      matches.forEach(m => {
        const div = document.createElement('div');
        div.className = 'match-card';
        div.innerHTML = `
          <div style="font-size:12px; color:var(--dim)">${m.name}</div>
          <div style="font-size:18px; font-weight:bold;">${m.shortName}</div>
          <div class="${m.status.type.state === 'in' ? 'status live' : ''}">${m.status.type.detail}</div>
        `;
        div.onclick = () => showDetail(m);
        listEl.appendChild(div);
      });
    } catch(e) { listEl.innerHTML = 'Nessun dato disponibile.'; }
  }

  async function showDetail(match) {
    document.getElementById('matches-list').style.display = 'none';
    document.getElementById('match-detail').classList.add('active');
    document.getElementById('btn-home').style.display = 'block';
    
    const summaryUrl = `https://site.api.espn.com/apis/site/v2/sports/${sports[currentSport].toLowerCase() === 'calcio' ? 'soccer/ita.1' : 'basketball/nba'}/summary?event=${match.id}`;
    const res = await fetch(summaryUrl);
    const data = await res.json();

    // Timeline Tradotta
    const timeline = document.getElementById('det-timeline');
    timeline.innerHTML = '';
    (data.keyEvents || []).forEach(ev => {
      timeline.innerHTML += `<div class="event-row"><span>${ev.clock?.displayValue || ''}</span><span>${translate(ev.text)}</span></div>`;
    });

    // Formazioni
    const lineups = document.getElementById('det-lineups');
    lineups.innerHTML = '';
    if(data.boxscore?.teams) {
        data.boxscore.teams.forEach(team => {
            lineups.innerHTML += `<div style="margin-top:10px; font-weight:bold;">${team.team.displayName}</div>`;
            (team.players || []).forEach(p => {
                if(p.starter) lineups.innerHTML += `<div class="player-row"><span>${p.athlete.displayName}</span><span>${p.position}</span></div>`;
            });
        });
    }
  }

  document.getElementById('btn-home').onclick = () => {
    document.getElementById('matches-list').style.display = 'block';
    document.getElementById('match-detail').classList.remove('active');
    document.getElementById('btn-home').style.display = 'none';
  };

  datePicker.onchange = loadData;
  loadData();
})();
</script>
</body>
</html>
