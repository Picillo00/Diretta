<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#000000">
<title>HUD Live Scores</title>
<style>
  :root {
    --bg: #000000;
    --text: #ffffff;
    --dim: #777777;
    --calcio: #39ff14; /* Verde */
    --basket: #ff7b00; /* Arancione */
    --tennis: #e1ff00; /* Giallo */
    --live: #ff3b3b;   /* Rosso */
    --card-bg: #111111;
  }
  
  * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  
  body, html {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden; touch-action: none; /* Disabilita lo scroll nativo per gestire le gesture custom */
  }

  /* --- HEADER (Sport, Data, Tasto Home) --- */
  #header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 15px; border-bottom: 2px solid var(--dim);
    font-size: 14px; font-weight: bold; background: #000; z-index: 10;
  }
  
  #btn-home {
    display: none; /* Nascosto nella home */
    background: #333; color: #fff; border: none; padding: 4px 10px;
    border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer;
  }
  
  #btn-home.active { display: block; }
  
  #sport-title { font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }
  #date-text { font-size: 12px; color: var(--dim); }

  /* --- CONTENITORE PRINCIPALE --- */
  #main-view {
    height: calc(100% - 45px); width: 100%; position: relative;
  }

  /* --- LISTA PARTITE (HOME) --- */
  #matches-list {
    height: 100%; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px;
  }
  #matches-list::-webkit-scrollbar { display: none; }

  .match-card {
    background: var(--card-bg); border-radius: 12px; padding: 12px;
    display: flex; justify-content: space-between; align-items: center;
    border-left: 4px solid var(--dim); cursor: pointer; transition: transform 0.1s;
  }
  .match-card:active { transform: scale(0.98); background: #222; }

  .team-info { display: flex; flex-direction: column; gap: 4px; font-size: 16px; font-weight: 600; }
  .score-info { text-align: right; display: flex; flex-direction: column; align-items: flex-end; }
  
  .score { font-size: 20px; font-weight: bold; letter-spacing: 2px; }
  .status.live { color: var(--live); animation: blink 1.5s infinite; font-size: 12px; font-weight: bold; }
  .status.finished { color: var(--dim); font-size: 12px; }
  .start-time { font-size: 10px; color: var(--dim); margin-top: 4px; }

  /* --- DETTAGLIO PARTITA (TIMELINE) --- */
  #match-detail {
    display: none; height: 100%; overflow-y: auto; padding: 15px; background: var(--bg);
  }
  #match-detail.active { display: block; }
  #match-detail::-webkit-scrollbar { display: none; }

  .detail-header { text-align: center; margin-bottom: 20px; font-size: 22px; font-weight: bold; }
  .detail-score { color: var(--calcio); font-size: 28px; margin: 5px 0; }
  
  .timeline { display: flex; flex-direction: column; gap: 8px; }
  .event { background: var(--card-bg); padding: 8px 12px; border-radius: 8px; font-size: 14px; display: flex; align-items: center; gap: 10px; }
  .event .icon { font-size: 18px; }

  @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
  
  /* Istruzioni in basso */
  #footer { position: fixed; bottom: 0; width: 100%; text-align: center; font-size: 10px; color: var(--dim); background: #000; padding: 4px; border-top: 1px solid #111; }
</style>
</head>
<body>

<div id="header">
  <button id="btn-home">⬅ HOME</button>
  <div id="sport-title" style="color: var(--calcio);">CALCIO</div>
  <div id="date-text"></div>
</div>

<div id="main-view">
  <div id="matches-list"></div>

  <div id="match-detail">
    <div class="detail-header">
      <div id="det-teams">Squadra A - Squadra B</div>
      <div class="detail-score" id="det-score">0 - 0</div>
      <div class="status" id="det-status"></div>
    </div>
    <div class="timeline" id="det-timeline">
      </div>
  </div>
</div>

<div id="footer"><b>Swipe:</b> Cambia Sport • <b>Pinch:</b> Dettagli / Home</div>

<script>
(() => {
  // Imposta la data di oggi (es. 30/05/2026)
  const today = new Date();
  document.getElementById('date-text').textContent = today.toLocaleDateString('it-IT');

  // DATABASE SIMULATO (Mock Data per testare le funzioni)
  const database = {
    "CALCIO": {
      color: "var(--calcio)",
      matches: [
        { id: 1, home: "Napoli", away: "Juventus", scoreH: 2, scoreA: 1, status: "LIVE 78'", time: "20:45", isLive: true,
          events: [
            { min: "12'", type: "goal", text: "⚽ Osimhen (Assist: Kvaratskhelia)" },
            { min: "34'", type: "yellow", text: "🟨 Cartellino Giallo per Danilo" },
            { min: "45'", type: "goal", text: "⚽ Vlahovic (Assist: Chiesa)" },
            { min: "60'", type: "red", text: "🟥 Cartellino Rosso per Bremer" },
            { min: "75'", type: "goal", text: "⚽ Kvaratskhelia (Rigore)" }
          ]
        },
        { id: 2, home: "Inter", away: "Milan", scoreH: 0, scoreA: 0, status: "LIVE 15'", time: "21:00", isLive: true,
          events: [
            { min: "10'", type: "miss", text: "❌ Rigore Sbagliato da Lautaro" }
          ]
        },
        { id: 3, home: "Roma", away: "Lazio", scoreH: 1, scoreA: 0, status: "FINITA", time: "18:00", isLive: false,
          events: [
            { min: "89'", type: "goal", text: "⚽ Dybala (Punizione)" }
          ]
        }
      ]
    },
    "BASKET": {
      color: "var(--basket)",
      matches: [
        { id: 4, home: "Olimpia Milano", away: "Virtus Bologna", scoreH: 85, scoreA: 82, status: "LIVE Q4", time: "20:30", isLive: true,
          events: [
            { min: "Q4", type: "info", text: "🏀 Tripla di Belinelli!" },
            { min: "Q4", type: "info", text: "🏀 Schiacciata di Shields" }
          ]
        }
      ]
    },
    "TENNIS": {
      color: "var(--tennis)",
      matches: [
        { id: 5, home: "Sinner", away: "Alcaraz", scoreH: "6 3", scoreA: "4 2", status: "LIVE Set 2", time: "15:00", isLive: true,
          events: [
            { min: "Set 1", type: "info", text: "🎾 Sinner vince il 1° Set (6-4)" },
            { min: "Set 2", type: "info", text: "🎾 Break per Alcaraz" }
          ]
        }
      ]
    }
  };

  const sportsList = ["CALCIO", "BASKET", "TENNIS"];
  let currentSportIndex = 0;
  let inDetailView = false;

  const matchesListEl = document.getElementById('matches-list');
  const matchDetailEl = document.getElementById('match-detail');
  const btnHome = document.getElementById('btn-home');
  const sportTitleEl = document.getElementById('sport-title');

  // --- FUNZIONI DI RENDER ---
  
  function renderHome() {
    inDetailView = false;
    matchesListEl.style.display = 'flex';
    matchDetailEl.classList.remove('active');
    btnHome.classList.remove('active');

    const sportName = sportsList[currentSportIndex];
    const sportData = database[sportName];

    sportTitleEl.textContent = sportName;
    sportTitleEl.style.color = sportData.color;
    document.getElementById('header').style.borderColor = sportData.color;

    matchesListEl.innerHTML = ''; // Svuota la lista

    sportData.matches.forEach(match => {
      const card = document.createElement('div');
      card.className = 'match-card';
      card.style.borderLeftColor = sportData.color;
      
      const statusClass = match.isLive ? 'status live' : 'status finished';

      card.innerHTML = `
        <div class="team-info">
          <span>${match.home}</span>
          <span>${match.away}</span>
        </div>
        <div class="score-info">
          <span class="score">${match.scoreH} - ${match.scoreA}</span>
          <span class="${statusClass}">${match.status}</span>
          <span class="start-time">Inizio: ${match.time}</span>
        </div>
      `;

      // Simula il click del pinch sul bracciale
      card.onclick = () => openDetail(match, sportData.color);
      
      matchesListEl.appendChild(card);
    });
  }

  function openDetail(match, color) {
    inDetailView = true;
    matchesListEl.style.display = 'none';
    matchDetailEl.classList.add('active');
    btnHome.classList.add('active');

    document.getElementById('det-teams').textContent = `${match.home} vs ${match.away}`;
    document.getElementById('det-score').textContent = `${match.scoreH} - ${match.scoreA}`;
    document.getElementById('det-score').style.color = color;
    
    const statusEl = document.getElementById('det-status');
    statusEl.textContent = match.status;
    statusEl.className = match.isLive ? 'status live' : 'status finished';

    const timelineEl = document.getElementById('det-timeline');
    timelineEl.innerHTML = '';

    if (match.events.length === 0) {
      timelineEl.innerHTML = '<div style="text-align:center; color:gray; font-size:12px; margin-top:20px;">Nessun evento saliente.</div>';
    } else {
      match.events.forEach(ev => {
        timelineEl.innerHTML += `
          <div class="event">
            <span style="font-weight:bold; color:${color}; min-width:30px;">${ev.min}</span>
            <span>${ev.text}</span>
          </div>
        `;
      });
    }
  }

  // Tasto Home
  btnHome.onclick = () => renderHome();

  // --- GESTIONE GESTURES (SWIPE E PINCH) ---
  
  let touchStartX = 0;
  let touchEndX = 0;
  let touchStartY = 0;
  let touchEndY = 0;

  // Usa pointer events per massima compatibilità con sistemi Neural Band / Touch
  document.addEventListener('pointerdown', e => {
    touchStartX = e.clientX;
    touchStartY = e.clientY;
  });

  document.addEventListener('pointerup', e => {
    touchEndX = e.clientX;
    touchEndY = e.clientY;
    handleGesture();
  });

  function handleGesture() {
    // Se siamo nel dettaglio partita, disabilitiamo lo swipe per cambiare sport
    if (inDetailView) return;

    const diffX = touchEndX - touchStartX;
    const diffY = Math.abs(touchEndY - touchStartY);

    // Se l'utente scorre in verticale più che in orizzontale, sta scrollando la lista (ignoriamo)
    if (diffY > Math.abs(diffX)) return;

    // Swipe Threshold (almeno 60px di movimento)
    if (diffX > 60) {
      // Swipe verso Destra (Sport Precedente)
      currentSportIndex = (currentSportIndex === 0) ? sportsList.length - 1 : currentSportIndex - 1;
      renderHome();
    } else if (diffX < -60) {
      // Swipe verso Sinistra (Sport Successivo)
      currentSportIndex = (currentSportIndex === sportsList.length - 1) ? 0 : currentSportIndex + 1;
      renderHome();
    }
  }

  // Tasti tastiera per i test su PC Desktop
  window.addEventListener('keydown', (e) => {
    if (inDetailView && e.key === 'Backspace') renderHome();
    if (!inDetailView) {
      if (e.key === 'ArrowRight') {
        currentSportIndex = (currentSportIndex === sportsList.length - 1) ? 0 : currentSportIndex + 1;
        renderHome();
      }
      if (e.key === 'ArrowLeft') {
        currentSportIndex = (currentSportIndex === 0) ? sportsList.length - 1 : currentSportIndex - 1;
        renderHome();
      }
    }
  });

  // Avvio app
  renderHome();

})();
</script>
</body>
</html>
