<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
    <title>Pro Live Dashboard</title>
    <style>
        :root { --bg: #0a0f1a; --surface: #111827; --surface2: #1a2236; --text: #e2e8f0; --accent-calcio: #22c55e; --border: #1e293b; }
        body { margin:0; background:var(--bg); color:var(--text); font-family: sans-serif; overflow:hidden; touch-action:none; }
        
        #header { display:flex; justify-content:space-between; align-items:center; padding:10px; background:var(--surface); border-bottom:1px solid var(--border); }
        #main-view { height:calc(100vh - 50px); overflow:hidden; position:relative; }
        
        /* Slider 3 pannelli */
        #detail-slider { display:flex; height:100%; width:300%; transition:transform 0.3s ease; }
        .detail-panel { width:33.33%; height:100%; overflow-y:auto; padding:15px; }
        
        /* Formazioni */
        .lineups-grid { display:flex; gap:10px; }
        .lineup-col { flex:1; background:var(--surface); padding:10px; border-radius:10px; }
        .player-item { font-size:11px; padding:6px 0; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center; }
        .badges { display:flex; gap:3px; }
        .badge { padding:1px 4px; border-radius:4px; font-size:9px; font-weight:bold; }
        
        /* Liste Generiche */
        .list-item { background:var(--surface); padding:12px; margin-bottom:8px; border-radius:8px; display:flex; justify-content:space-between; align-items:center; }
        
        #btn-home { background:var(--surface2); color:#fff; border:none; padding:8px 15px; border-radius:20px; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>

<div id="header">
    <button id="btn-home" style="display:none;">⬅ TORNA</button>
    <div id="sport-title" style="font-weight:800; font-size:16px;">CALCIO</div>
</div>

<div id="main-view">
    <div id="matches-list" style="height:100%; overflow-y:auto; padding:10px;"></div>

    <div id="match-detail" style="display:none; height:100%;">
        <div id="detail-slider">
            <div id="panel-formazioni" class="detail-panel">
                <div style="text-align:center; margin-bottom:15px;">
                    <h2 id="det-teams-title"></h2>
                    <p id="det-score-status" style="font-size:20px; font-weight:bold;"></p>
                </div>
                <div class="lineups-grid" id="lineups-container"></div>
            </div>
            <div id="panel-classifica" class="detail-panel">
                <h3>📊 Classifica</h3>
                <div id="table-container"></div>
            </div>
            <div id="panel-partite" class="detail-panel">
                <h3>📅 Ultime Partite</h3>
                <div id="history-container"></div>
            </div>
        </div>
    </div>
</div>

<script>
(() => {
    let currentDetailMatch = null;
    let swipeIndex = 0; // 0=Formazioni, 1=Classifica, 2=Partite

    // --- LOGICA SWIPE ---
    const slider = document.getElementById('detail-slider');
    let startX = 0;
    document.getElementById('match-detail').addEventListener('touchstart', e => startX = e.touches[0].clientX);
    document.getElementById('match-detail').addEventListener('touchend', e => {
        let diff = startX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 50) {
            if (diff > 0 && swipeIndex < 2) swipeIndex++;
            else if (diff < 0 && swipeIndex > 0) swipeIndex--;
            slider.style.transform = `translateX(-${swipeIndex * 33.33}%)`;
        }
    });

    // --- CARICAMENTO DATI ---
    async function openDetail(match) {
        currentDetailMatch = match;
        swipeIndex = 0; slider.style.transform = 'translateX(0)';
        document.getElementById('matches-list').style.display = 'none';
        document.getElementById('match-detail').style.display = 'block';
        document.getElementById('btn-home').style.display = 'block';

        // Reset UI
        document.getElementById('det-teams-title').textContent = `${match.home} vs ${match.away}`;
        document.getElementById('det-score-status').textContent = `${match.scoreH} - ${match.scoreA} (${match.status})`;
        
        loadFormazioni(match);
        loadClassifica(match);
        loadPartite(match);
    }

    // FORMATAZIONE GIOCATORI
    async function loadFormazioni(match) {
        const container = document.getElementById('lineups-container');
        container.innerHTML = "Caricamento...";
        try {
            const res = await fetch(match.summaryUrl);
            const data = await res.json();
            const competitors = data.gamepackage?.competition?.competitors || [];
            
            let html = "";
            competitors.forEach(team => {
                html += `<div class="lineup-col"><h4>${team.team.shortDisplayName}</h4>`;
                (team.roster?.entries || []).forEach(p => {
                    if(p.starter) {
                        html += `
                        <div class="player-item">
                            <span>${p.athlete.shortName}</span>
                            <div class="badges">
                                ${p.stats?.some(s=>s.name==='goals') ? '<span class="badge" style="background:#22c55e">⚽</span>' : ''}
                                ${p.stats?.some(s=>s.name==='yellowCards') ? '<span class="badge" style="background:#eab308">🟨</span>' : ''}
                                ${p.stats?.some(s=>s.name==='redCards') ? '<span class="badge" style="background:#ef4444">🟥</span>' : ''}
                            </div>
                        </div>`;
                    }
                });
                html += `</div>`;
            });
            container.innerHTML = html;
        } catch(e) { container.innerHTML = "Dati formazioni non disponibili."; }
    }

    // CLASSIFICA
    async function loadClassifica(match) {
        const cont = document.getElementById('table-container');
        cont.innerHTML = "Caricamento...";
        try {
            const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/${match.leagueSlug}/standings`);
            const data = await res.json();
            let html = "<table style='width:100%; font-size:12px;'>";
            (data.standings?.entries || []).forEach((e, i) => {
                html += `<tr><td>${i+1}</td><td>${e.team.shortDisplayName}</td><td style="font-weight:bold">${e.stats.find(s=>s.name==='points').value}</td></tr>`;
            });
            cont.innerHTML = html + "</table>";
        } catch(e) { cont.innerHTML = "Classifica non disponibile."; }
    }

    // ULTIME PARTITE
    async function loadPartite(match) {
        const cont = document.getElementById('history-container');
        cont.innerHTML = "Caricamento...";
        try {
            // Recuperiamo lo stesso scoreboard ma senza data per vedere le recenti
            const res = await fetch(match.summaryUrl.split('/summary')[0]);
            const data = await res.json();
            let html = "";
            (data.events || []).slice(0, 10).forEach(e => {
                html += `<div class="list-item">
                    <span>${e.shortName}</span>
                    <span style="font-weight:bold">${e.competitions[0].status.type.shortDetail}</span>
                </div>`;
            });
            cont.innerHTML = html;
        } catch(e) { cont.innerHTML = "Impossibile caricare lo storico."; }
    }

    // LOGICA HOME
    document.getElementById('btn-home').onclick = () => {
        document.getElementById('matches-list').style.display = 'block';
        document.getElementById('match-detail').style.display = 'none';
        document.getElementById('btn-home').style.display = 'none';
    };

    // ... [Mantieni il resto del tuo codice originale per il fetch iniziale e render lista]
    // (Assicurati di passare match.leagueSlug e match.summaryUrl nell'oggetto match che crei nel fetch iniziale)
})();
</script>
</body>
</html>
