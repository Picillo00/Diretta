<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HUD Smart Glasses - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #000000; 
            overflow: hidden; 
            font-family: sans-serif;
        }
        ::-webkit-scrollbar { 
            display: none; 
        }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center bg-black">

    <div id="setup-screen" class="z-50 flex flex-col items-center justify-center p-8 space-y-8 w-full max-w-[500px]">
        <h1 class="text-4xl font-bold text-white text-center tracking-wide">HUD Setup</h1>

        <div id="error-log" class="w-full text-center text-red-500 font-semibold text-lg hidden bg-red-950/30 p-3 rounded-xl border border-red-900"></div>

        <div class="w-full">
            <label class="block text-zinc-400 text-lg mb-2 font-semibold">Seleziona Modalità</label>
            <select id="mode-select" class="w-full bg-zinc-900 text-white text-xl p-4 rounded-xl border border-zinc-700 outline-none focus:border-amber-500">
                <option value="live">Sottotitoli Live (Scorrimento)</option>
                <option value="teams">Modalità Teams (Ultime 3 frasi)</option>
            </select>
        </div>

        <button id="start-btn" class="w-full bg-amber-500 text-black text-2xl font-bold py-5 px-8 rounded-xl active:scale-95 transition-transform">
            Avvia HUD e Sblocca Mic
        </button>
        <p class="text-zinc-600 text-sm text-center">L'app richiederà l'accesso hardware al microfono dei Ray-Ban Meta.</p>
    </div>

    <div id="hud-screen" class="hidden w-[600px] h-[600px] flex flex-col justify-end p-4 relative">
        <div id="text-container" class="w-full flex flex-col justify-end space-y-5 text-[40px] leading-tight font-extrabold pb-4"></div>
        <div id="status-dot" class="absolute top-4 right-4 w-4 h-4 bg-red-600 rounded-full animate-pulse"></div>
    </div>

    <script>
        const setupScreen = document.getElementById('setup-screen');
        const hudScreen = document.getElementById('hud-screen');
        const startBtn = document.getElementById('start-btn');
        const modeSelect = document.getElementById('mode-select');
        const textContainer = document.getElementById('text-container');
        const statusDot = document.getElementById('status-dot');
        const errorLog = document.getElementById('error-log');

        let wakeLock = null;
        let currentMode = 'live';
        let teamsSentences = [];

        function showError(msg) {
            errorLog.textContent = msg;
            errorLog.classList.remove('hidden');
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            showError("Errore: Questo browser sui Ray-Ban non supporta la Web Speech API.");
        }

        startBtn.addEventListener('click', async () => {
            currentMode = modeSelect.value;
            errorLog.classList.add('hidden'); // Resetta errori precedenti

            // STAGE 1: Forzatura autorizzazione Microfono tramite getUserMedia
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                // Se otteniamo lo stream, lo chiudiamo subito: ci serviva solo a svegliare il permesso di sistema
                stream.getTracks().forEach(track => track.stop());
            } catch (err) {
                showError(`Permesso Mic Negato: ${err.name}. Controlla le impostazioni dei Ray-Ban.`);
                return; // Blocca l'esecuzione se il sistema rifiuta il mic
            }

            // STAGE 2: Attivazione del Riconoscimento Vocale
            if (SpeechRecognition) {
                const recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = 'it-IT';

                recognition.onstart = () => {
                    statusDot.classList.replace('bg-red-600', 'bg-green-500'); // Diventa verde quando ascolta davvero
                    setupScreen.classList.add('hidden');
                    hudScreen.classList.remove('hidden');
                    richiediWakeLock();
                };

                recognition.onerror = (event) => {
                    console.error("Errore Speech:", event.error);
                    statusDot.classList.replace('bg-green-500', 'bg-red-600');
                    // Se l'errore avviene ad HUD avviato, stampiamo l'errore direttamente nell'HUD per leggerlo sulla lente
                    const errPar = document.createElement('p');
                    errPar.className = "text-red-500 text-2xl font-bold";
                    errPar.textContent = `Errore Vocale: ${event.error}`;
                    textContainer.appendChild(errPar);
                };

                recognition.onend = () => {
                    // Riavvio automatico continuo
                    try { recognition.start(); } catch(e) {}
                };

                recognition.onresult = (event) => {
                    let interimTranscript = '';
                    let finalTranscript = '';

                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) {
                            finalTranscript += event.results[i][0].transcript;
                        } else {
                            interimTranscript += event.results[i][0].transcript;
                        }
                    }
                    aggiornaInterfaccia(finalTranscript, interimTranscript);
                };

                try {
                    recognition.start();
                } catch (e) {
                    showError(`Impossibile avviare SpeechRecognition: ${e.message}`);
                }
            }
        });

        function aggiornaInterfaccia(finale, provvisorio) {
            if (currentMode === 'live') {
                if (finale) {
                    const p = document.createElement('p');
                    p.className = "text-amber-400 drop-shadow-[0_2px_2px_rgba(0,0,0,1)]"; 
                    p.textContent = finale;
                    textContainer.appendChild(p);
                }
                const vecchiProvvisori = textContainer.querySelectorAll('.provvisorio');
                vecchiProvvisori.forEach(el => el.remove());

                if (provvisorio) {
                    const pProv = document.createElement('p');
                    pProv.className = "provvisorio text-amber-600 opacity-80 italic";
                    pProv.textContent = provvisorio;
                    textContainer.appendChild(pProv);
                }
                while (textContainer.children.length > 8) {
                    textContainer.removeChild(textContainer.firstChild);
                }
            } else {
                if (finale) {
                    teamsSentences.push(finale);
                    if (teamsSentences.length > 3) teamsSentences.shift();
                }
                textContainer.innerHTML = '';
                teamsSentences.forEach((frase, index) => {
                    const p = document.createElement('p');
                    if (index === 0 && teamsSentences.length === 3) {
                        p.className = "text-amber-500 opacity-50";
                    } else {
                        p.className = "text-amber-400 drop-shadow-[0_2px_2px_rgba(0,0,0,1)]";
                    }
                    p.textContent = frase;
                    textContainer.appendChild(p);
                });
                if (provvisorio) {
                    const pProv = document.createElement('p');
                    pProv.className = "text-amber-600 opacity-80 italic";
                    pProv.textContent = provvisorio;
                    textContainer.appendChild(pProv);
                }
            }
        }

        async function richiediWakeLock() {
            if ('wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
            }
        }
    </script>
</body>
</html>
