<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0a0f1a">
<title>LiveScore Pro – Neural Band Ready</title>
<style>
:root {
--bg: #0a0f1a;
--surface: #111827;
--surface2: #1a2236;
--text: #e2e8f0;
--text2: #94a3b8;
--text3: #64748b;
--accent-calcio: #22c55e;
--accent-basket: #f97316;
--accent-tennis: #eab308;
--accent-volley: #ec4899;
--live-red: #ef4444;
--card-yellow: #eab308;
--card-red: #ef4444;
--border: #1e293b;
--radius: 12px;
--radius-sm: 8px;
--shadow: 0 2px 8px rgba(0,0,0,0.3);
}

* { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

body, html {
height: 100%; background: var(--bg); color: var(--text);
font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
overflow: hidden; touch-action: manipulation;
}

#header {
display: flex; justify-content: space-between; align-items: center;
padding: 10px 14px; background: var(--surface); border-bottom: 1px solid var(--border);
z-index: 20; position: relative; gap: 8px;
}
.header-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
#btn-home {
display: none; background: var(--surface2); color: #fff; border: none;
padding: 7px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;
cursor: pointer; letter-spacing: 0.3px; white-space: nowrap; transition: 0.2s;
}
#btn-home.active { display: block; }
#btn-home:active { background: #334155; transform: scale(0.96); }

#sport-selector {
display: flex; gap: 4px; background: var(--surface2); padding: 4px; border-radius: 20px;
}
.sport-btn {
background: transparent; border: 1px solid transparent; font-size: 15px; width: 30px; height: 30px;
border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
transition: 0.2s; filter: grayscale(100%) opacity(0.5);
}
.sport-btn.active {
filter: none; transform: scale(1.05);
}

#date-picker {
background: var(--surface2); color: var(--text); border: 2px solid var(--border);
padding: 8px 12px; border-radius: 20px; font-family: inherit; font-size: 14px;
color-scheme: dark; outline: none; cursor: pointer; font-weight: 600;
transition: border 0.2s, box-shadow 0.2s; margin: 0 auto; flex-shrink: 0;
}
#date-picker:hover { border-color: var(--text2); }
#date-picker:focus { border-color: var(--text2); box-shadow: 0 0 0 2px rgba(255,255,255,0.1); cursor: text; }
#date-picker::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; opacity: 0.8; }
.header-right { width: 40px; }

#main-view { height: calc(100% - 48px); width: 100%; position: relative; overflow: hidden; }

#matches-list {
height: 100%; overflow-y: auto; padding: 10px 12px; display: flex;
flex-direction: column; gap: 8px; padding-bottom: 40px;
-webkit-overflow-scrolling: touch;
}
#matches-list::-webkit-scrollbar { display: none; }

.section-banner {
background: var(--surface2); border-radius: var(--radius-sm); padding: 10px 14px;
text-align: center; font-size: 11px; color: var(--text2); font-weight: 600;
letter-spacing: 0.5px; border: 1px dashed var(--border); margin-bottom: 4px;
}
.section-banner span { font-weight: 700; color: #fff; }

.league-collapsible { display: flex; flex-direction: column; gap: 2px; }
.league-toggle {
display: flex; align-items: center; justify-content: space-between;
padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border);
border-radius: var(--radius); color: var(--text); font-family: inherit;
font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: 0.5px;
transition: all 0.2s; width: 100%; text-align: left; gap: 8px;
}
.league-toggle:active { background: #253044; transform: scale(0.98); }
.league-toggle .toggle-icon { font-size: 16px; transition: transform 0.25s; flex-shrink: 0; }
.league-toggle.open .toggle-icon { transform: rotate(180deg); }
.league-toggle .badge {
background: var(--border); color: var(--text2); font-size: 11px; padding: 2px 10px;
border-radius: 12px; font-weight: 600; margin-left: auto; margin-right: 8px;
}
.league-matches {
display: flex; flex-direction: column; gap: 6px; max-height: 0; overflow: hidden;
opacity: 0; transition: max-height 0.4s ease, opacity 0.3s ease, margin 0.3s ease;
margin-top: 0;
}
.league-matches.expanded {
max-height: 70vh; overflow-y: auto; opacity: 1; margin-top: 4px; padding-right: 2px;
}

.match-card {
background: var(--surface); border-radius: var(--radius); padding: 8px 12px;
display: flex; flex-direction: column; gap: 4px; border-left: 4px solid transparent;
cursor: pointer; transition: all 0.15s; box-shadow: var(--shadow);
overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.match-card:active { transform: scale(0.985); background: #1a2338; }
.match-card::-webkit-scrollbar { display: none; }

.league-tag { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.match-row { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 700; line-height: 1.2; min-width: min-content; }
.team-compact { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }
.team-compact.home { justify-content: flex-end; }
.team-compact.away { justify-content: flex-start; }
.team-logo { width: 24px; height: 24px; object-fit: contain; border-radius: 4px; background: #1e293b; flex-shrink: 0; }
.team-name-full { white-space: nowrap; font-size: 13px; }
.score-time-block { display: flex; flex-direction: column; align-items: center; gap: 2px; flex-shrink: 0; min-width: 55px; }
.inline-score { font-size: 18px; font-weight: 900; letter-spacing: 1px; font-variant-numeric: tabular-nums; font-family: 'Inter','SF Mono',monospace; color: #fff; text-align: center; }
.match-time { font-size: 10px; color: var(--text3); font-weight: 500; white-space: nowrap; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 3px; vertical-align: middle; }
.status-dot.live { background: var(--live-red); animation: pulse-live 1.5s infinite; }
.status-dot.finished { background: var(--text3); }
.status-dot.upcoming { background: #fbbf24; }

@keyframes pulse-live { 0%,100%{opacity:1;} 50%{opacity:0.55;} }

/* DETTAGLIO PARTITA */
#match-detail { display: none; height: 100%; overflow: hidden; background: var(--bg); position: relative; }
#match-detail.active { display: block; }
#detail-slider { display: flex; height: 100%; width: 300%; transition: transform 0.3s ease; }
#detail-slider.show-classifica { transform: translateX(-33.333%); }
#detail-slider.show-partite { transform: translateX(-66.666%); }
.detail-panel { width: 33.333%; height: 100%; overflow-y: auto; padding: 14px; padding-bottom: 50px; }
.detail-panel::-webkit-scrollbar { display: none; }

#panel-formazioni .detail-header { text-align: center; margin-bottom: 12px; background: var(--surface); border-radius: var(--radius); padding: 14px 12px; box-shadow: var(--shadow); }
.detail-header .league-row { display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; }
.detail-header .league-name { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }
.detail-teams { font-size: 18px; font-weight: 800; margin-top: 6px; letter-spacing: 0.3px; }
.detail-score { font-size: 36px; font-weight: 900; margin: 6px 0; letter-spacing: 2px; font-variant-numeric: tabular-nums; font-family: 'Inter','SF Mono',monospace; }
.penalty-score { font-size: 14px; font-weight: 600; color: var(--text2); margin-top: 2px; }
.detail-status { font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 14px; display: inline-block; letter-spacing: 0.4px; }

.section-title-timeline { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 8px; padding-left: 4px; margin-top: 10px; }
.timeline { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.event { background: var(--surface); padding: 10px 12px; border-radius: var(--radius-sm); font-size: 13px; display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow); line-height: 1.3; }
.event .ev-icon { font-size: 20px; flex-shrink: 0; }
.event .ev-time { font-weight: 800; min-width: 32px; font-size: 12px; flex-shrink: 0; letter-spacing: 0.3px; }
.event .ev-text { font-weight: 500; font-size: 12px; line-height: 1.4; }

.lineups-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
.lineup-col { background: var(--surface); border-radius: var(--radius); padding: 10px; box-shadow: var(--shadow); }
.lineup-title { font-size: 12px; font-weight: 800; text-align: center; padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-bottom: 6px; letter-spacing: 0.3px; color: #fff; display: flex; align-items: center; justify-content: center; gap: 6px; }
.lineup-title img { width: 22px; height: 22px; object-fit: contain; }
.lineup-list { list-style: none; font-size: 11px; }
.lineup-list li { padding: 5px 0; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; gap: 2px; border-bottom: 1px solid rgba(255,255,255,0.03); min-height: 38px; }
.lineup-list li .plyr-name { font-weight: 700; font-size: 11px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
.lineup-list li .plyr-badges { display: flex; gap: 3px; align-items: center; flex-wrap: wrap; margin-top: 1px; }
.lineup-list li .pos-tag { color: var(--text3); font-size: 8px; font-weight: 800; background: var(--surface2); padding: 1px 4px; border-radius: 4px; text-align: center; flex-shrink: 0; display: inline-block; }
.event-badge { font-size: 9px; font-weight: 700; background: var(--surface2); border-radius: 6px; padding: 1px 4px; display: inline-flex; align-items: center; gap: 2px; white-space: nowrap; }
.event-badge.goal { color: #22c55e; background: rgba(34,197,94,0.1); }
.event-badge.yellow { color: #eab308; background: rgba(234,179,8,0.1); }
.event-badge.red { color: #ef4444; background: rgba(239,68,68,0.1); }
.subs-label-lineup { font-size: 10px; font-weight: 700; margin-top: 8px; color: var(--text3); letter-spacing: 0.5px; padding: 4px 0; border-top: 1px solid var(--border); text-align: center; background: rgba(255,255,255,0.01); }

#panel-classifica { display: flex; flex-direction: column; }
#panel-classifica .classifica-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: var(--surface); border-radius: var(--radius); margin-bottom: 10px; }
#panel-classifica .classifica-title { font-weight: 800; font-size: 14px; letter-spacing: 0.5px; }
#classifica-table-wrap { flex: 1; overflow-y: auto; background: var(--surface); border-radius: var(--radius); padding: 4px 8px; }
#classifica-table-wrap::-webkit-scrollbar { display: none; }
#classifica-table { width: 100%; border-collapse: collapse; font-size: 11px; }
#classifica-table th { color: var(--text3); font-weight: 600; padding: 8px 4px; text-align: center; border-bottom: 1px solid var(--border); font-size: 9px; letter-spacing: 0.5px; position: sticky; top: 0; background: var(--surface); }
#classifica-table th:first-child { text-align: left; padding-left: 8px; }
#classifica-table td { padding: 8px 4px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.03); font-weight: 500; }
#classifica-table tr.highlighted-row { background: rgba(34,197,94,0.08); }
.classifica-logo { width: 18px; height: 18px; object-fit: contain; border-radius: 4px; }

#panel-partite .partite-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: var(--surface); border-radius: var(--radius); margin-bottom: 10px; }
.partite-title { font-weight: 800; font-size: 14px; letter-spacing: 0.5px; }
#partite-list { display: flex; flex-direction: column; gap: 6px; }
.match-card-small { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px; display: flex; align-items: center; justify-content: space-between; font-size: 12px; box-shadow: var(--shadow); }

#footer { position: fixed; bottom: 0; width: 100%; text-align: center; font-size: 9px; color: var(--text3); background: var(--surface); padding: 5px; border-top: 1px solid var(--border); z-index: 30; letter-spacing: 0.3px; }
.loading-text { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 13px; font-weight: 500; }

#detail-tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
.tab-btn { flex: 1; padding: 12px 0; background: transparent; border: none; border-bottom: 3px solid transparent; color: var(--text2); font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.tab-btn.active { color: #fff; border-bottom-color: var(--accent-calcio); }
</style>
</head>
<body>

<div id="header">
<div class="header-left">
<button id="btn-home">⬅ HOME</button>
<div id="sport-selector">
<button class="sport-btn active" data-sport="0" title="Calcio">⚽</button>
<button class="sport-btn" data-sport="1" title="Basket (Top Teams)">🏀</button>
<button class="sport-btn" data-sport="2" title="Tennis (Top Players)">🎾</button>
<button class="sport-btn" data-sport="3" title="Volley Femminile (Italia)">🏐</button>
</div>
</div>
<input type="date" id="date-picker">
<div class="header-right"></div>
</div>

<div id="main-view">
<div id="matches-list"></div>

<div id="match-detail">
<div id="detail-tabs">
<button class="tab-btn active" data-target="formazioni">Formazioni</button>
<button class="tab-btn" data-target="classifica">Classifica</button>
<button class="tab-btn" data-target="partite">Partite</button>
</div>

<div id="detail-slider">
<div id="panel-formazioni" class="detail-panel">
<div class="detail-header">
<div class="league-row"><span class="league-name" id="det-league"></span></div>
<div class="detail-teams" id="det-teams"></div>
<div class="detail-score" id="det-score"></div>
<div class="penalty-score" id="det-penalty" style="display:none;"></div>
<span class="detail-status" id="det-status"></span>
</div>
<div class="section-title-timeline">📋 MOMENTI SALIENTI</div>
<div class="timeline" id="det-timeline"></div>
<div class="section-title-timeline">🛡️ FORMAZIONI IN CAMPO</div>
<div class="lineups-grid" id="lineups-grid-container"></div>
</div>

<div id="panel-classifica" class="detail-panel">
<div class="classifica-header"><span class="classifica-title" id="classifica-title">📊 Classifica</span></div>
<div id="classifica-table-wrap"><table id="classifica-table"></table></div>
</div>

<div id="panel-partite" class="detail-panel">
<div class="partite-header"><span class="partite-title" id="partite-title">📅 Partite Precedenti</span></div>
<div id="partite-list"></div>
</div>
</div>
</div>
</div>

<div id="footer"><b>Usa i bottoni</b> nei Dettagli &nbsp;|&nbsp; <b>Tocca Card</b> per info &nbsp;|&nbsp; <b>⬅ Home</b> per uscire</div>

<script>
(() => {
const datePicker = document.getElementById('date-picker');
const today = new Date();
datePicker.value = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

// SPORT CONFIGS E FILTRI RICHIESTI
const sportConfigs = {
"CALCIO": {
  color: "var(--accent-calcio)",
  leagues: [
    { slug: "uefa.champions", url: "https://site.api.espn.com/apis/site/v2/sports/soccer/uefa.champions/scoreboard" },
    { slug: "ita.1", url: "https://site.api.espn.com/apis/site/v2/sports/soccer/ita.1/scoreboard" },
    { slug: "eng.1", url: "https://site.api.espn.com/apis/site/v2/sports/soccer/eng.1/scoreboard" }
  ]
  // Nessun filtro per il calcio, mostra tutto
},
"BASKET": {
  color: "var(--accent-basket)",
  leagues: [{ slug: "nba", url: "https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard" }],
  // FILTRO: Solo le partite "Importanti" richieste
  importantTeams: ["lakers", "warriors", "celtics", "nuggets", "mavericks", "heat", "knicks", "bucks", "suns", "76ers"]
},
"TENNIS": {
  color: "var(--accent-tennis)",
  leagues: [
    { slug: "atp", url: "https://site.api.espn.com/apis/site/v2/sports/tennis/atp/scoreboard" },
    { slug: "wta", url: "https://site.api.espn.com/apis/site/v2/sports/tennis/wta/scoreboard" }
  ],
  // FILTRO: Solo i Top Player
  importantTeams: ["sinner", "alcaraz", "djokovic", "medvedev", "zverev", "musetti", "berrettini", "paolini", "swiatek", "sabalenka", "gauff"]
},
"VOLLEY": {
  color: "var(--accent-volley)",
  leagues: [{ slug: "ncaa.w.volley", url: "https://site.api.espn.com/apis/site/v2/sports/volleyball/womens-college-volleyball/scoreboard" }],
  // FILTRO: Solo Italia Femminile
  importantTeams: ["italia", "italy"]
}
};

const sportsList = ["CALCIO","BASKET","TENNIS","VOLLEY"];
let currentSportIndex = 0;
let inDetailView = false;
let currentMatches = [];
let currentDetailMatch = null;
let currentPanel = 'formazioni';

const matchesListEl = document.getElementById('matches-list');
const matchDetailEl = document.getElementById('match-detail');
const detailSlider = document.getElementById('detail-slider');
const btnHome = document.getElementById('btn-home');

const sportBtns = document.querySelectorAll('.sport-btn');
sportBtns.forEach(btn => {
  btn.addEventListener('click', (e) => {
    const targetBtn = e.target.closest('.sport-btn');
    if(!targetBtn) return;
    currentSportIndex = parseInt(targetBtn.dataset.sport);
    const config = sportConfigs[sportsList[currentSportIndex]];
    
    sportBtns.forEach((b, idx) => {
      if (idx === currentSportIndex) {
        b.classList.add('active'); b.style.background = `rgba(255,255,255,0.15)`; b.style.borderColor = config.color;
      } else {
        b.classList.remove('active'); b.style.background = 'transparent'; b.style.borderColor = 'transparent';
      }
    });

    if (inDetailView) {
      inDetailView = false; matchDetailEl.classList.remove('active'); btnHome.classList.remove('active');
      matchesListEl.style.display = 'flex'; document.getElementById('sport-selector').style.display = 'flex';
    }
    loadDataAndRender();
  });
});
sportBtns[0].style.background = `rgba(255,255,255,0.15)`; sportBtns[0].style.borderColor = sportConfigs["CALCIO"].color;

const tabButtons = document.querySelectorAll('.tab-btn');
tabButtons.forEach(btn => { btn.addEventListener('click', (e) => goToPanel(e.target.getAttribute('data-target'))); });

function goToPanel(panel) {
  currentPanel = panel;
  tabButtons.forEach(btn => {
    if (btn.getAttribute('data-target') === panel) {
      btn.classList.add('active'); btn.style.borderBottomColor = sportConfigs[sportsList[currentSportIndex]].color;
    } else {
      btn.classList.remove('active'); btn.style.borderBottomColor = 'transparent';
    }
  });

  if (panel === 'formazioni') { detailSlider.classList.remove('show-classifica','show-partite'); } 
  else if (panel === 'classifica') { detailSlider.classList.add('show-classifica'); detailSlider.classList.remove('show-partite'); } 
  else if (panel === 'partite') { detailSlider.classList.add('show-partite'); }
}

btnHome.addEventListener('click', () => {
    inDetailView = false; matchDetailEl.classList.remove('active'); btnHome.classList.remove('active');
    matchesListEl.style.display = 'flex'; document.getElementById('sport-selector').style.display = 'flex';
});

datePicker.addEventListener('change', ()=>loadDataAndRender());

async function fetchRealData(sportName, dateStr) {
const config = sportConfigs[sportName];
let allMatches = [];
const fetchPromises = config.leagues.map(async (leagueObj) => {
try {
const response = await fetch(`${leagueObj.url}?dates=${dateStr}`);
if (!response.ok) return [];
const data = await response.json();
if (data.events) {
return data.events.map(event => {
const comp = event.competitions[0];
const home = comp.competitors.find(c=>c.homeAway==='home') || comp.competitors[0];
const away = comp.competitors.find(c=>c.homeAway==='away') || comp.competitors[1];
return {
id: event.id, leagueSlug: leagueObj.slug, league: data.leagues?.[0] ? (data.leagues[0].abbreviation||data.leagues[0].name) : leagueObj.slug,
home: home?.team?.shortDisplayName || home?.team?.name || '???', away: away?.team?.shortDisplayName || away?.team?.name || '???',
homeLogo: home?.team?.logo || home?.team?.logos?.[0]?.href || '', awayLogo: away?.team?.logo || away?.team?.logos?.[0]?.href || '',
scoreH: home?.score??'0', scoreA: away?.score??'0',
status: event.status.type.shortDetail || '', state: event.status.type.state, isLive: event.status.type.state==='in',
time: new Date(event.date).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}), summaryUrl: leagueObj.url.replace('/scoreboard','/summary?event='+event.id)
};
});
}
return [];
} catch (e) { return []; }
});
const results = await Promise.all(fetchPromises);
results.forEach(m=> allMatches = allMatches.concat(m));

// FILTRO TOP TEAMS (Se configurato per questo sport)
if (config.importantTeams) {
    allMatches = allMatches.filter(m => {
        const h = m.home.toLowerCase();
        const a = m.away.toLowerCase();
        return config.importantTeams.some(t => h.includes(t) || a.includes(t));
    });
}

return allMatches;
}

async function searchPreviousDays(sportName, startDateStr, maxDays=7) {
const start = new Date(+startDateStr.substring(0,4), +startDateStr.substring(4,6)-1, +startDateStr.substring(6,8));
for (let i=1; i<=maxDays; i++) {
const d = new Date(start); d.setDate(d.getDate()-i);
const ds = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
const matches = await fetchRealData(sportName, ds);
if (matches.length>0) return { matches, dateFormatted: `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}` };
}
return null;
}

function createMatchCard(match, configColor) {
const card = document.createElement('div');
card.className = 'match-card'; card.dataset.id = match.id;
card.style.borderLeftColor = configColor;

let timeDisplay = match.state === 'pre' ? '🕐 ' + match.time : (match.isLive ? '<span class="status-dot live"></span> <span style="color: var(--live-red);">' + match.status + '</span>' : '⏱️ ' + match.status);

card.innerHTML = `
<span class="league-tag">🏆 ${match.league}</span>
<div class="match-row">
<div class="team-compact home"><img src="${match.homeLogo}" class="team-logo" onerror="this.style.display='none'"><span class="team-name-full">${match.home}</span></div>
<div class="score-time-block"><span class="inline-score">${match.scoreH} - ${match.scoreA}</span><span class="match-time">${timeDisplay}</span></div>
<div class="team-compact away"><span class="team-name-full">${match.away}</span><img src="${match.awayLogo}" class="team-logo" onerror="this.style.display='none'"></div>
</div>`;
return card;
}

async function loadDataAndRender() {
const sportName = sportsList[currentSportIndex];
const config = sportConfigs[sportName];
const espnDate = datePicker.value.replace(/-/g,'');

btnHome.style.color = config.color;
matchesListEl.innerHTML = '<div class="loading-text">📡 Ricerca match in corso...</div>';

currentMatches = await fetchRealData(sportName, espnDate);
let bannerHTML = '';

// Se non ci sono partite oggi per i team filtrati, cerchiamo nei giorni precedenti
if (currentMatches.length === 0) {
    const prev = await searchPreviousDays(sportName, espnDate, 7);
    if (prev && prev.matches.length > 0) {
        currentMatches = prev.matches;
        bannerHTML = `<div class="section-banner">📅 Nessun top match odierno.<br><span style="color:${config.color}">Ultimi match trovati – ${prev.dateFormatted}</span></div>`;
    }
}

// MOCK INJECTOR: Per non farti vedere la schermata vuota se i tuoi VIP o l'Italia non giocano in questi giorni
if (currentMatches.length === 0) {
    if (sportName === 'BASKET') {
        currentMatches.push({
            id: 'mock-basket', leagueSlug: 'nba', league: 'NBA (Esibizione)',
            home: 'L.A. Lakers', away: 'Golden State',
            homeLogo: 'https://a.espncdn.com/i/teamlogos/nba/500/lal.png', awayLogo: 'https://a.espncdn.com/i/teamlogos/nba/500/gs.png',
            scoreH: '112', scoreA: '108', status: "Q4 2:15", state: "in", isLive: true, summaryUrl: ''
        });
        bannerHTML = `<div class="section-banner">🏀 Nessuna partita dei VIP oggi.<br><span style="color:${config.color}">Generato Match di Esibizione</span></div>`;
    } else if (sportName === 'TENNIS') {
        currentMatches.push({
            id: 'mock-tennis', leagueSlug: 'atp', league: 'ATP Tour (Esibizione)',
            home: 'J. Sinner', away: 'C. Alcaraz',
            homeLogo: 'https://a.espncdn.com/i/teamlogos/tennis/500/sinner-jannik.png', awayLogo: 'https://a.espncdn.com/i/teamlogos/tennis/500/alcaraz-carlos.png',
            scoreH: '2', scoreA: '1', status: "Set 4", state: "in", isLive: true, summaryUrl: ''
        });
        bannerHTML = `<div class="section-banner">🎾 Nessun Top Player in campo.<br><span style="color:${config.color}">Generato Match di Esibizione</span></div>`;
    } else if (sportName === 'VOLLEY') {
        currentMatches.push({
            id: 'mock-volley', leagueSlug: 'fivb', league: 'VNL Femminile',
            home: 'Italia (F)', away: 'Turchia (F)',
            homeLogo: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/03/Flag_of_Italy.svg/128px-Flag_of_Italy.svg.png', awayLogo: 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/Flag_of_Turkey.svg/128px-Flag_of_Turkey.svg.png',
            scoreH: '2', scoreA: '2', status: "Set 5", state: "in", isLive: true, summaryUrl: ''
        });
        bannerHTML = `<div class="section-banner">🏐 Nessun match ufficiale dell'Italia oggi.<br><span style="color:${config.color}">Generata Partita Nazionale</span></div>`;
    }
}

matchesListEl.innerHTML = bannerHTML;
if (currentMatches.length === 0) {
    matchesListEl.innerHTML += '<div class="loading-text">😕 Nessuna partita rilevante trovata.</div>';
    return;
}

const grouped = {};
currentMatches.forEach(m => {
    if (!grouped[m.leagueSlug]) grouped[m.leagueSlug] = { leagueName: m.league, matches: [] };
    grouped[m.leagueSlug].matches.push(m);
});

Object.keys(grouped).forEach(slug => {
    const group = grouped[slug];
    const section = document.createElement('div'); section.className = 'league-collapsible';
    const toggle = document.createElement('button'); toggle.className = 'league-toggle open';
    toggle.innerHTML = `🏆 ${group.leagueName} <span class="badge">${group.matches.length}</span> <span class="toggle-icon">▲</span>`;
    const container = document.createElement('div'); container.className = 'league-matches expanded';
    group.matches.forEach(m => container.appendChild(createMatchCard(m, config.color)));
    
    toggle.addEventListener('click', (e) => {
        if (container.classList.contains('expanded')) { container.classList.remove('expanded'); toggle.querySelector('.toggle-icon').textContent = '▼'; } 
        else { container.classList.add('expanded'); toggle.querySelector('.toggle-icon').textContent = '▲'; }
    });
    section.appendChild(toggle); section.appendChild(container); matchesListEl.appendChild(section);
});
}

matchesListEl.addEventListener('click', (e) => {
const card = e.target.closest('.match-card');
if (!card || inDetailView) return;
const match = currentMatches.find(m => m.id === card.dataset.id);
if (match) openDetail(match);
});

// GENERATORE FORMAZIONI ADATTIVO PER SPORT
function generateMockLineups(match) {
const sportName = sportsList[currentSportIndex];
let positions = [];

if (sportName === 'CALCIO') {
    positions = [{ pos: 'POR', count: 1 }, { pos: 'DIF', count: 4 }, { pos: 'CEN', count: 4 }, { pos: 'ATT', count: 2 }];
} else if (sportName === 'BASKET') {
    positions = [{ pos: 'PG', count: 1 }, { pos: 'SG', count: 1 }, { pos: 'SF', count: 1 }, { pos: 'PF', count: 1 }, { pos: 'C', count: 1 }];
} else if (sportName === 'VOLLEY') {
    positions = [{ pos: 'PAL', count: 1 }, { pos: 'SCH', count: 2 }, { pos: 'CEN', count: 2 }, { pos: 'OPP', count: 1 }, { pos: 'LIB', count: 1 }];
} else if (sportName === 'TENNIS') {
    positions = [{ pos: 'PL', count: 1 }];
}

const buildColumn = (teamName) => {
    let html = `<div class="lineup-col"><div class="lineup-title">🛡️ ${teamName}</div><ul class="lineup-list">`;
    positions.forEach(p => {
        for (let i = 0; i < p.count; i++) {
            let pName = sportName === 'TENNIS' ? teamName : `${teamName.substring(0,3).toUpperCase()} Giocatore`;
            html += `<li><div><span class="pos-tag">${p.pos}</span> <span class="plyr-name">${pName}</span></div></li>`;
        }
    });
    if(sportName !== 'TENNIS') {
        html += `<div class="subs-label-lineup">PANCHINA</div>`;
        for (let i = 1; i <= 3; i++) { html += `<li><div><span class="pos-tag">RIS</span> <span class="plyr-name">Riserva ${i}</span></div></li>`; }
    }
    html += `</ul></div>`;
    return html;
};

return buildColumn(match.home) + buildColumn(match.away);
}

async function openDetail(match) {
currentDetailMatch = match; inDetailView = true;
currentPanel = 'formazioni'; detailSlider.classList.remove('show-classifica','show-partite');
matchesListEl.style.display = 'none'; document.getElementById('sport-selector').style.display = 'none';
matchDetailEl.classList.add('active'); btnHome.classList.add('active');

const color = sportConfigs[sportsList[currentSportIndex]].color;
document.getElementById('det-league').textContent = '🏆 '+match.league;
document.getElementById('det-teams').innerHTML = `<span><img src="${match.homeLogo}" style="width:24px;height:24px;vertical-align:middle;border-radius:4px;" onerror="this.style.display='none'"> ${match.home} - ${match.away} <img src="${match.awayLogo}" style="width:24px;height:24px;vertical-align:middle;border-radius:4px;" onerror="this.style.display='none'"></span>`;
document.getElementById('det-score').textContent = match.scoreH+' - '+match.scoreA;
document.getElementById('det-score').style.color = color;
const statusEl = document.getElementById('det-status');
statusEl.textContent = match.status; statusEl.style.color = match.isLive?'#fff':'var(--text3)'; statusEl.style.background = match.isLive?'var(--live-red)':'var(--surface2)';

document.getElementById('det-timeline').innerHTML = `<div class="event"><span class="ev-icon">⏱️</span><span class="ev-time">Info</span><span class="ev-text">Simulazione eventi per match Demo/Filtrati.</span></div>`;
document.getElementById('lineups-grid-container').innerHTML = generateMockLineups(match);
goToPanel('formazioni');
}

loadDataAndRender();
})();
</script>
