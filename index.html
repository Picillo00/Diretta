<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#000000">
<title>HUD Global Live Scores</title>
<style>
  :root {
    --bg: #000000;
    --text: #ffffff;
    --dim: #777777;
    --calcio: #39ff14; /* Verde */
    --basket: #ff7b00; /* Arancione */
    --tennis: #e1ff00; /* Giallo */
    --live: #ff3b3b;   /* Rosso */
    --card-bg: #111111;
  }
  
  * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  
  body, html {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden; touch-action: none; 
  }

  /* --- HEADER --- */
  #header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 15px; border-bottom: 2px solid var(--dim);
    font-size: 14px; font-weight: bold; background: #000; z-index: 10;
  }
  
  .header-left { display: flex; align-items: center; gap: 10px; }

  #btn-home {
    display: none; 
    background: #333; color: #fff; border: none; padding: 4px 10px;
    border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer;
  }
  #btn-home.active { display: block; }
  
  #sport-title { font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }
  
  /* TENDINA DATA */
  #date-picker {
    background: transparent; color: var(--text);
    border: 1px solid var(--dim); padding: 5px 8px;
    border-radius: 6px; font-family: inherit; font-size: 13px;
    color-scheme: dark; outline: none; cursor: pointer;
  }

  /* --- VISTA PRINCIPALE --- */
  #main-view {
    height: calc(100% - 45px); width: 100%; position: relative;
  }

  /* --- LISTA PARTITE --- */
  #matches-list {
    height: 100%; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px;
    padding-bottom: 30px;
  }
  #matches-list::-webkit-scrollbar { display: none; }

  .match-card {
    background: var(--card-bg); border-radius: 12px; padding: 12px;
    display: flex; justify-content: space-between; align-items: center;
    border-left: 4px solid var(--dim); cursor: pointer; transition: transform 0.1s;
  }
  .match-card:active { transform: scale(0.98); background: #222; }

  .team-info { display: flex; flex-direction: column; gap: 4px; font-size: 16px; font-weight: 600; }
  .league-tag { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
  
  .score-info { text-align: right; display: flex; flex-direction: column; align-items: flex-end; }
  .score { font-size: 20px; font-weight: bold; letter-spacing: 2px; }
  .status.live { color: var(--live); animation: blink 1.5s infinite; font-size: 12px; font-weight: bold; }
  .status.finished { color: var(--dim); font-size: 12px; }
  .start-time { font-size: 10px; color: var(--dim); margin-top: 4px; }

  /* --- DETTAGLIO PARTITA --- */
  #match-detail {
    display: none; height: 100%; overflow-y: auto; padding: 15px; background: var(--bg);
    padding-bottom: 40px;
  }
  #match-detail.active { display: block; }
  #match-detail::-webkit-scrollbar { display: none; }

  .detail-header { text-align: center; margin-bottom: 20px; font-size: 20px; font-weight: bold; }
  .detail-score { color: var(--calcio); font-size: 28px; margin: 5px 0; }
  
  .timeline { display: flex; flex-direction: column; gap: 8px; }
  .event { background: var(--card-bg); padding: 8px 12px; border-radius: 8px; font-size: 14px; display: flex; align-items: center; gap: 10px; }
  .event .icon { font-size: 18px; }

  @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
  
  #footer { position: fixed; bottom: 0; width: 100%; text-align: center; font-size: 10px; color: var(--dim); background: #000; padding: 4px; border-top: 1px solid #111; z-index: 20; }
</style>
</head>
<body>

<div id="header">
  <div class="header-left">
    <button id="btn-home">⬅ HOME</button>
    <div id="sport-title" style="color: var(--calcio);">CALCIO</div>
  </div>
  <input type="date" id="date-picker">
</div>

<div id="main-view">
  <div id="matches-list"></div>

  <div id="match-detail">
    <div class="detail-header">
      <div id="det-teams">Squadra A - Squadra B</div>
      <div class="detail-score" id="det-score">0 - 0</div>
      <div class="status" id="det-status"></div>
    </div>
    <div class="timeline" id="det-timeline"></div>
  </div>
</div>

<div id="footer"><b>Swipe:</b> Cambia Sport • <b>Pinch:</b> Dettagli / Home</div>

<script>
(() => {
  // Imposta la data di oggi nella tendina all'avvio
  const datePicker = document.getElementById('date-picker');
  const today = new Date();
  datePicker.value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

  // LISTE GLOBALI - Interroga le API per "tutto il mondo"
  const sportConfigs = {
    "CALCIO": {
      color: "var(--calcio)",
      leagues: [
        "ita.1", "ita.2", "eng.1", "esp.1", "ger.1", "fra.1", 
        "uefa.champions", "uefa.europa", "uefa.conference", "fifa.world",
        "uefa.euro", "uefa.nations", "usa.1", "bra.1", "arg.1", "ksa.1", "ned.1", "por.1"
      ].map(l => `https://site.api.espn.com/apis/site/v2/sports/soccer/${l}/scoreboard`)
    },
    "BASKET": {
      color: "var(--basket)",
      leagues: [
        "nba", "wnba", "euroleague", "mens-college-basketball", "fiba.world"
      ].map(l => `https://site.api.espn.com/apis/site/v2/sports/basketball/${l}/scoreboard`)
    },
    "TENNIS": {
      color: "var(--tennis)",
      leagues: [
        "atp", "wta"
      ].map(l => `https://site.api.espn.com/apis/site/v2/sports/tennis/${l}/scoreboard`)
    }
  };

  const sportsList = ["CALCIO", "BASKET", "TENNIS"];
  let currentSportIndex = 0;
  let inDetailView = false;
  let currentMatches = [];

  const matchesListEl = document.getElementById('matches-list');
  const matchDetailEl = document.getElementById('match-detail');
  const btnHome = document.getElementById('btn-home');
  const sportTitleEl = document.getElementById('sport-title');

  // Ricarica dati quando cambi data dal calendario
  datePicker.addEventListener('change', () => loadDataAndRender());

  // --- MOTORE DI SCARICAMENTO PARALLELO (Super Veloce) ---
  async function fetchRealData(sportName, dateStr) {
    const config = sportConfigs[sportName];
    let allMatches = [];
    
    // Promesse multiple: scarichiamo i campionati di tutto il mondo simultaneamente!
    const fetchPromises = config.leagues.map(async (baseUrl) => {
      try {
        const fetchUrl = `${baseUrl}?dates=${dateStr}`;
        const response = await fetch(fetchUrl);
        if (!response.ok) return [];
        const data = await response.json();
        
        if (data.events) {
          return data.events.map(event => {
            const comp = event.competitions[0];
            const home = comp.competitors.find(c => c.homeAway === 'home') || comp.competitors[0];
            const away = comp.competitors.find(c => c.homeAway === 'away') || comp.competitors[1];
            
            const leagueName = data.leagues && data.leagues[0] ? (data.leagues[0].abbreviation || data.leagues[0].name) : '';

            return {
              id: event.id,
              league: leagueName,
              home: home.team.shortDisplayName || home.team.name,
              away: away.team.shortDisplayName || away.team.name,
              scoreH: home.score || '0',
              scoreA: away.score || '0',
              status: event.status.type.shortDetail,
              state: event.status.type.state, // 'in', 'pre', 'post'
              isLive: event.status.type.state === 'in',
              time: new Date(event.date).toLocaleTimeString('it-IT', {hour: '2-digit', minute:'2-digit'}),
              summaryUrl: baseUrl.replace('/scoreboard', '/summary?event=' + event.id)
            };
          });
        }
        return [];
      } catch (error) {
        return [];
      }
    });

    const results = await Promise.all(fetchPromises);
    results.forEach(matches => { allMatches = allMatches.concat(matches); });

    // Algoritmo: Ordina le partite portando le LIVE in cima
    allMatches.sort((a, b) => {
      if (a.isLive && !b.isLive) return -1;
      if (!a.isLive && b.isLive) return 1;
      if (a.state === 'pre' && b.state === 'post') return -1;
      if (a.state === 'post' && b.state === 'pre') return 1;
      return 0;
    });

    return allMatches;
  }

  async function loadDataAndRender() {
    inDetailView = false;
    matchDetailEl.classList.remove('active');
    btnHome.classList.remove('active');
    matchesListEl.style.display = 'flex';
    
    const sportName = sportsList[currentSportIndex];
    const config = sportConfigs[sportName];
    
    // Converte la data dal picker (YYYY-MM-DD) nel formato server (YYYYMMDD)
    const espnDate = datePicker.value.replace(/-/g, '');
    
    sportTitleEl.textContent = sportName;
    sportTitleEl.style.color = config.color;
    document.getElementById('header').style.borderColor = config.color;
    
    matchesListEl.innerHTML = '<div style="text-align:center; padding:30px;">Aggiornamento dati mondiali...<br><span style="font-size:10px;color:gray;">Connessione ai server sportivi</span></div>';
    
    currentMatches = await fetchRealData(sportName, espnDate);
    
    matchesListEl.innerHTML = '';
    
    if (currentMatches.length === 0) {
       matchesListEl.innerHTML = '<div style="text-align:center; padding:30px; color:gray;">Nessuna partita rilevante per la data selezionata.</div>';
       return;
    }
    
    currentMatches.forEach(match => {
      const card = document.createElement('div');
      card.className = 'match-card';
      card.dataset.id = match.id;
      card.style.borderLeftColor = config.color;
      
      const statusClass = match.isLive ? 'status live' : 'status finished';

      card.innerHTML = `
        <div class="team-info">
          <span class="league-tag">${match.league}</span>
          <span>${match.home}</span>
          <span>${match.away}</span>
        </div>
        <div class="score-info">
          <span class="score">${match.scoreH} - ${match.scoreA}</span>
          <span class="${statusClass}">${match.status}</span>
          <span class="start-time">${match.state === 'pre' ? 'Ore: ' + match.time : 'Inizio: ' + match.time}</span>
        </div>
      `;
      
      matchesListEl.appendChild(card);
    });
  }

  // --- DETTAGLIO PARTITA (GOAL, ASSIST, CARTELLINI) ---
  async function openDetail(match) {
    inDetailView = true;
    matchesListEl.style.display = 'none';
    matchDetailEl.classList.add('active');
    btnHome.classList.add('active');

    const config = sportConfigs[sportsList[currentSportIndex]];
    const color = config.color;

    document.getElementById('det-teams').innerHTML = `<span style="font-size:12px; color:gray;">${match.league}</span><br>${match.home} - ${match.away}`;
    document.getElementById('det-score').textContent = `${match.scoreH} - ${match.scoreA}`;
    document.getElementById('det-score').style.color = color;
    
    const statusEl = document.getElementById('det-status');
    statusEl.textContent = match.status;
    statusEl.className = match.isLive ? 'status live' : 'status finished';

    const timelineEl = document.getElementById('det-timeline');
    timelineEl.innerHTML = '<div style="text-align:center; padding: 30px;">Scaricamento eventi...</div>';

    try {
      const res = await fetch(match.summaryUrl);
      const summaryData = await res.json();
      
      timelineEl.innerHTML = ''; 
      
      if (summaryData.keyEvents && summaryData.keyEvents.length > 0) {
        summaryData.keyEvents.forEach(ev => {
          let icon = '⏱️';
          if (ev.type && ev.type.text) {
            const t = ev.type.text.toLowerCase();
            if (t.includes('goal')) icon = '⚽';
            else if (t.includes('yellow')) icon = '🟨';
            else if (t.includes('red')) icon = '🟥';
            else if (t.includes('penalty')) icon = '❌';
          }
          
          timelineEl.innerHTML += `
            <div class="event">
              <span style="font-weight:bold; color:${color}; min-width:40px;">${ev.clock ? ev.clock.displayValue : ''}</span>
              <span class="icon">${icon}</span>
              <span>${ev.text || ev.shortText || 'Evento non specificato'}</span>
            </div>
          `;
        });
      } else {
        timelineEl.innerHTML = '<div style="text-align:center; color:gray; font-size:12px; margin-top:20px;">Nessun evento o marcatore disponibile per questa partita.</div>';
      }
    } catch(e) {
      timelineEl.innerHTML = '<div style="text-align:center; color:red; font-size:12px; margin-top:20px;">Errore di connessione al server eventi.</div>';
    }
  }

  // --- GESTIONE DELLE GESTURE ---
  let touchStartX = 0;
  let touchStartY = 0;

  document.addEventListener('pointerdown', e => {
    touchStartX = e.clientX;
    touchStartY = e.clientY;
  });

  document.addEventListener('pointerup', e => {
    // Ignora le gesture se l'utente sta cliccando il calendario
    if (e.target.id === 'date-picker') return;

    const touchEndX = e.clientX;
    const touchEndY = e.clientY;
    
    const diffX = touchEndX - touchStartX;
    const diffY = Math.abs(touchEndY - touchStartY);

    // Pinch (Click fermo senza scorrere)
    if (Math.abs(diffX) < 20 && diffY < 20) {
      const target = e.target;
      
      if (target.closest('#btn-home') && inDetailView) {
        loadDataAndRender();
        return;
      }
      
      const card = target.closest('.match-card');
      if (card && !inDetailView) {
        const matchId = card.dataset.id;
        const match = currentMatches.find(m => m.id === matchId);
        if(match) openDetail(match);
      }
      return;
    }

    // Swipe laterale per cambiare sport (solo fuori dai dettagli)
    if (inDetailView) return;

    if (diffX > 60) {
      currentSportIndex = (currentSportIndex === 0) ? sportsList.length - 1 : currentSportIndex - 1;
      loadDataAndRender();
    } else if (diffX < -60) {
      currentSportIndex = (currentSportIndex === sportsList.length - 1) ? 0 : currentSportIndex + 1;
      loadDataAndRender();
    }
  });

  window.addEventListener('keydown', (e) => {
    if (inDetailView && e.key === 'Backspace') loadDataAndRender();
    if (!inDetailView) {
      if (e.key === 'ArrowRight') {
        currentSportIndex = (currentSportIndex === sportsList.length - 1) ? 0 : currentSportIndex + 1;
        loadDataAndRender();
      }
      if (e.key === 'ArrowLeft') {
        currentSportIndex = (currentSportIndex === 0) ? sportsList.length - 1 : currentSportIndex - 1;
        loadDataAndRender();
      }
    }
  });

  // Avvia l'app caricando i dati di oggi
  loadDataAndRender();

})();
</script>
</body>
</html>
